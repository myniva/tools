<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hash Text</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      color: #24292e;
    }
    h1 { margin-bottom: 4px; }
    .subtitle { color: #586069; margin: 0 0 20px; font-size: 0.95rem; }

    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
    textarea {
      width: 100%;
      height: 140px;
      font-family: inherit;
      font-size: 0.92rem;
      border: 1px solid #d1d5da;
      border-radius: 6px;
      padding: 10px 12px;
      resize: vertical;
      background: #f6f8fa;
      color: #24292e;
    }
    textarea:focus { outline: none; border-color: #5b4fcf; box-shadow: 0 0 0 3px rgba(91,79,207,.15); }

    .results {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .hash-row {
      background: #f6f8fa;
      border: 1px solid #e1e4e8;
      border-radius: 8px;
      padding: 12px 16px;
    }
    .hash-row .algo {
      font-size: 0.78rem;
      font-weight: 700;
      color: #5b4fcf;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }
    .hash-row .value {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.82rem;
      word-break: break-all;
      color: #24292e;
    }
    .hash-row .row-controls {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    button.btn {
      padding: 5px 12px;
      border-radius: 5px;
      border: 1px solid #d1d5da;
      background: white;
      cursor: pointer;
      font-size: 0.8rem;
    }
    button.btn:hover { background: #f3f4f6; }
    .copy-status { font-size: 0.78rem; color: #28a745; font-weight: 500; }

    .encoding-row {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .encoding-row label {
      font-weight: normal;
      font-size: 0.88rem;
      color: #586069;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .empty-hint {
      color: #aaa;
      font-size: 0.88rem;
      margin-top: 20px;
      text-align: center;
    }
  </style>
</head>
<body>
  <h1>Hash Text</h1>
  <p class="subtitle">Generate SHA-256 and SHA-512 hashes using the Web Crypto API — no data leaves your browser.</p>

  <label for="input">Input</label>
  <textarea id="input" placeholder="Type or paste text to hash…"></textarea>

  <div class="encoding-row">
    <span style="font-size:.88rem;color:#586069;font-weight:600">Output encoding:</span>
    <label><input type="radio" name="enc" value="hex" checked> Hex</label>
    <label><input type="radio" name="enc" value="base64"> Base64</label>
  </div>

  <div class="results" id="results">
    <div class="empty-hint">Enter text above to see hashes.</div>
  </div>

  <script>
    const inputEl  = document.getElementById('input');
    const resultsEl= document.getElementById('results');

    const ALGOS = ['SHA-256', 'SHA-512'];

    async function digest(algorithm, text) {
      const encoded = new TextEncoder().encode(text);
      const hashBuf = await crypto.subtle.digest(algorithm, encoded);
      return hashBuf;
    }

    function bufToHex(buf) {
      return Array.from(new Uint8Array(buf))
        .map(b => b.toString(16).padStart(2, '0'))
        .join('');
    }

    function bufToBase64(buf) {
      return btoa(String.fromCharCode(...new Uint8Array(buf)));
    }

    function getEncoding() {
      return document.querySelector('input[name="enc"]:checked')?.value ?? 'hex';
    }

    let debounce;
    async function update() {
      const text = inputEl.value;
      if (!text) {
        resultsEl.innerHTML = '<div class="empty-hint">Enter text above to see hashes.</div>';
        return;
      }
      const enc = getEncoding();
      const rows = await Promise.all(ALGOS.map(async algo => {
        const buf = await digest(algo, text);
        const value = enc === 'hex' ? bufToHex(buf) : bufToBase64(buf);
        return { algo, value };
      }));

      resultsEl.innerHTML = rows.map(({ algo, value }) => `
        <div class="hash-row">
          <div class="algo">${algo}</div>
          <div class="value" id="val-${algo}">${value}</div>
          <div class="row-controls">
            <button class="btn" onclick="copyValue('${algo}', this)">Copy</button>
            <span class="copy-status" id="cs-${algo}"></span>
          </div>
        </div>
      `).join('');
    }

    window.copyValue = (algo, btn) => {
      const val = document.getElementById(`val-${algo}`)?.textContent ?? '';
      navigator.clipboard.writeText(val).then(() => {
        const cs = document.getElementById(`cs-${algo}`);
        if (cs) { cs.textContent = 'Copied!'; setTimeout(() => { cs.textContent = ''; }, 1500); }
      });
    };

    inputEl.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(update, 80);
    });

    document.querySelectorAll('input[name="enc"]').forEach(r =>
      r.addEventListener('change', update)
    );
  </script>
<script src="footer.js?ae9ea2e1"></script>
</body>
</html>
