<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 Encoder / Decoder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      color: #24292e;
    }
    h1 { margin-bottom: 4px; }
    .subtitle { color: #586069; margin: 0 0 20px; font-size: 0.95rem; }

    .mode-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border: 1px solid #d1d5da;
      border-radius: 6px;
      overflow: hidden;
      width: fit-content;
    }
    .mode-tabs button {
      padding: 8px 20px;
      border: none;
      background: white;
      cursor: pointer;
      font-size: 0.9rem;
      color: #586069;
      transition: background 0.15s;
    }
    .mode-tabs button.active {
      background: #5b4fcf;
      color: white;
      font-weight: 600;
    }
    .mode-tabs button:not(.active):hover { background: #f3f4f6; }

    label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 0.9rem; }
    textarea {
      width: 100%;
      height: 180px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.85rem;
      border: 1px solid #d1d5da;
      border-radius: 6px;
      padding: 10px 12px;
      resize: vertical;
      background: #f6f8fa;
      color: #24292e;
    }
    textarea:focus { outline: none; border-color: #5b4fcf; box-shadow: 0 0 0 3px rgba(91,79,207,.15); }
    textarea.error { border-color: #cb2431; background: #fff5f5; }

    .arrow {
      text-align: center;
      font-size: 1.4rem;
      color: #5b4fcf;
      margin: 10px 0;
      user-select: none;
    }

    .row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    button.btn {
      padding: 7px 16px;
      border-radius: 6px;
      border: 1px solid #d1d5da;
      background: white;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
    }
    button.btn:hover { background: #f3f4f6; }
    .copy-status { font-size: 0.82rem; color: #28a745; font-weight: 500; }

    .option-row {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .option-row label {
      font-weight: normal;
      font-size: 0.88rem;
      color: #586069;
      margin: 0;
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .error-msg { color: #cb2431; font-size: 0.85rem; margin-top: 6px; min-height: 1.2em; }
  </style>
</head>
<body>
  <h1>Base64 Encoder / Decoder</h1>
  <p class="subtitle">Encode plain text to Base64 or decode Base64 back to text.</p>

  <div class="mode-tabs">
    <button id="tab-encode" class="active">Encode</button>
    <button id="tab-decode">Decode</button>
  </div>

  <div class="option-row">
    <label>
      <input type="checkbox" id="url-safe"> URL-safe (replace <code>+/</code> with <code>-_</code>)
    </label>
  </div>

  <label id="input-label">Plain text</label>
  <textarea id="input" placeholder="Type or paste text here…"></textarea>

  <div class="arrow" aria-hidden="true">↓</div>

  <label id="output-label">Base64 output</label>
  <textarea id="output" readonly placeholder="Output appears here…"></textarea>
  <div class="error-msg" id="error-msg"></div>

  <div class="row">
    <button class="btn" id="clear-btn">Clear</button>
    <button class="btn" id="copy-btn">Copy output</button>
    <span class="copy-status" id="copy-status"></span>
  </div>

  <script>
    const inputEl   = document.getElementById('input');
    const outputEl  = document.getElementById('output');
    const errorEl   = document.getElementById('error-msg');
    const urlSafe   = document.getElementById('url-safe');
    const copyBtn   = document.getElementById('copy-btn');
    const copyStatus= document.getElementById('copy-status');
    const clearBtn  = document.getElementById('clear-btn');
    const tabEncode = document.getElementById('tab-encode');
    const tabDecode = document.getElementById('tab-decode');
    const inputLabel  = document.getElementById('input-label');
    const outputLabel = document.getElementById('output-label');

    let mode = 'encode';

    function toUrlSafe(str)   { return str.replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, ''); }
    function fromUrlSafe(str) { return str.replace(/-/g, '+').replace(/_/g, '/'); }

    function run() {
      errorEl.textContent = '';
      outputEl.classList.remove('error');
      inputEl.classList.remove('error');
      const raw = inputEl.value;
      if (!raw) { outputEl.value = ''; return; }

      if (mode === 'encode') {
        let encoded = btoa(unescape(encodeURIComponent(raw)));
        if (urlSafe.checked) encoded = toUrlSafe(encoded);
        outputEl.value = encoded;
      } else {
        try {
          const normalised = fromUrlSafe(raw.trim());
          outputEl.value = decodeURIComponent(escape(atob(normalised)));
        } catch {
          inputEl.classList.add('error');
          errorEl.textContent = 'Invalid Base64 input.';
          outputEl.value = '';
        }
      }
    }

    function setMode(m) {
      mode = m;
      tabEncode.classList.toggle('active', m === 'encode');
      tabDecode.classList.toggle('active', m === 'decode');
      inputLabel.textContent  = m === 'encode' ? 'Plain text'    : 'Base64 input';
      outputLabel.textContent = m === 'encode' ? 'Base64 output' : 'Decoded text';
      inputEl.placeholder     = m === 'encode' ? 'Type or paste text here…' : 'Paste Base64 here…';
      inputEl.value = '';
      outputEl.value = '';
      errorEl.textContent = '';
    }

    tabEncode.addEventListener('click', () => setMode('encode'));
    tabDecode.addEventListener('click', () => setMode('decode'));
    inputEl.addEventListener('input', run);
    urlSafe.addEventListener('change', run);

    clearBtn.addEventListener('click', () => {
      inputEl.value = '';
      outputEl.value = '';
      errorEl.textContent = '';
      inputEl.classList.remove('error');
    });

    copyBtn.addEventListener('click', () => {
      if (!outputEl.value) return;
      navigator.clipboard.writeText(outputEl.value).then(() => {
        copyStatus.textContent = 'Copied!';
        setTimeout(() => { copyStatus.textContent = ''; }, 1500);
      });
    });
  </script>
</body>
</html>
